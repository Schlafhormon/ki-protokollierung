# Docker Compose for Protokollierungsassistenz
# Uses pre-built images from GitHub Container Registry (ghcr.io)
# No HuggingFace token required - models are pre-bundled in the images!
#
# Usage: docker compose up -d
# GPU mode: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/aihpi/pilotproject-protokollierungsassistenz/frontend:latest}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/aihpi/pilotproject-protokollierungsassistenz/backend:cpu-latest}
    ports:
      - "8010:8010"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v2}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_BATCH_SIZE=${WHISPER_BATCH_SIZE:-16}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-de}
      - HF_TOKEN=${HF_TOKEN:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen3:8b}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-2}
      - LLM_RETRY_BACKOFF_SECONDS=${LLM_RETRY_BACKOFF_SECONDS:-0.5}
      - LLM_CHUNK_CHARS=${LLM_CHUNK_CHARS:-12000}
      - LLM_STRUCTURED_FALLBACK=${LLM_STRUCTURED_FALLBACK:-true}
      - PERSISTENCE_DB_PATH=${PERSISTENCE_DB_PATH:-/app/data/sessions.sqlite3}
      - JOB_MAX_AGE_SECONDS=${JOB_MAX_AGE_SECONDS:-7200}
      - JOB_MAX_COUNT=${JOB_MAX_COUNT:-100}
      - DELETE_UPLOADS_ON_JOB_CLEANUP=${DELETE_UPLOADS_ON_JOB_CLEANUP:-false}
      - DELETE_UPLOADS_ON_CANCEL_OR_FAILURE=${DELETE_UPLOADS_ON_CANCEL_OR_FAILURE:-true}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-524288000}
      - TRANSCRIPTION_CONCURRENCY=${TRANSCRIPTION_CONCURRENCY:-1}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - backend_hf_cache:/app/.cache/huggingface
      - backend_torch_cache:/app/.cache/torch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s # Reduced from 20 min - models are pre-loaded
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    environment:
      - OLLAMA_MODEL=${LLM_MODEL:-qwen3:8b}
    entrypoint: ["/bin/bash", "-c", "sed 's/\\r$//' /ollama-entrypoint.sh > /tmp/entrypoint.sh && /bin/bash /tmp/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s # 5 min grace period for model download
    restart: unless-stopped

volumes:
  ollama_data:
  backend_hf_cache:
  backend_torch_cache:
