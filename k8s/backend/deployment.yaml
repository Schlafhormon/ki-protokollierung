apiVersion: apps/v1
kind: Deployment
metadata:
  name: tops-backend
  labels:
    app: tops-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tops-backend
  template:
    metadata:
      labels:
        app: tops-backend
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        accelerator: a30
      initContainers:
        - name: init-backend-data
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /storage/data /storage/uploads"]
          volumeMounts:
            - name: backend-data
              mountPath: /storage
      containers:
        - name: backend
          image: ghcr.io/aihpi/pilotproject-protokollierungsassistenz/backend:sha-74353f6-gpu
          ports:
            - containerPort: 8010
          volumeMounts:
            - name: backend-data
              mountPath: /app/data
              subPath: data
            - name: backend-data
              mountPath: /app/uploads
              subPath: uploads
          envFrom:
            - configMapRef:
                name: tops-backend-config
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tops-secret
                  key: LLM_API_KEY
                  optional: true
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: tops-backend-data
